# .metate/profile.yml — per-repo config for the `metate` pipeline.
# The skill engines are codebase-agnostic; everything project-specific lives here.
# bootstrap.sh fills in the gates from detected tooling — adjust everything else.

# --- gates ---------------------------------------------------------------
fastGate: "__FASTGATE__"   # quick loop, run after each review round
shipGate: "__SHIPGATE__"   # full pre-PR gate (mirrors CI)

# --- implementer (the only writer) ---------------------------------------
implementer:
  backend: cursor          # cursor | codex | claude | gemini
  model: ""                # e.g. composer-2.5 | gpt-5.3-codex-fast (blank = adapter default)

sessionFile: ".metate/session.json"
issueLedger: ".metate/issues.json"   # issues filed by prep, read by ship for auto-close
isolation: none            # none | worktree

# --- review (metate-review) -----------------------------------------------
# What the read-only sub-agents must scrutinize in THIS codebase. Replace with
# your real invariants — the difference between a generic review and one that
# catches your domain's actual failure modes.
reviewFocus: |
  - <invariant 1, e.g. tenant/scope isolation on every transactional query>
  - <invariant 2, e.g. money math at the cent in the payment path>
  - <invariant 3, e.g. state transitions go through the domain guard>

# Which buckets the implementer auto-fixes each round. Reporting is unconditional —
# whatever isn't auto-fixed is still surfaced for you to decide.
#   blockers           — only blockers fixed; warnings + DESIGN reported  (safest, default)
#   blockers+warnings  — blockers + warnings fixed; DESIGN reported
#   all                — blockers + warnings + DESIGN fixed (most churn; may rewrite working code)
review:
  autoFix: blockers

# --- prep (metate-prep) ---------------------------------------------------
prep:
  baseBranch: main         # branch new work from here (set to `dev` if you gitflow)
  readingOrder: []         # docs to read before building, in order
  techDebtFile: ""         # e.g. docs/TECH-DEBT.md
  issues:                  # file the issue ledger from the text plan at sprint start
    create: true           # false = ledger is managed outside metate
    tracker: github        # gh CLI
    granularity: test-matrix  # one issue per DoD test-matrix item (T1…Tn)
    labels: ["sprint"]     # applied to every filed issue
    milestone: ""          # blank = none

# --- smoke (metate-smoke) -------------------------------------------------
smoke:
  command: ""              # e.g. pnpm e2e   (how to run the e2e/smoke suite)
  seedCommand: ""          # e.g. pnpm db:seed   (must be idempotent)

# --- aftercare (metate-aftercare) -----------------------------------------
# Deliverables to create/update at sprint close. Use {N} for the sprint number.
aftercare:
  deliverables: []         # e.g. ["docs/handoff/post-sprint-{N}.md", "CHANGELOG.md"]

# --- ship (metate-ship) ---------------------------------------------------
ship:
  prTarget: main           # PR target; set to `dev` if you gitflow (match baseBranch)
  commitStyle: "conventional, bisectable, one per layer"
  issueCloseKeyword: "Closes"   # PR body keyword for auto-close
