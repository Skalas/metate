# .metate/profile.yml — metate dogfooding itself.
# Bash + markdown repo: gates are the Makefile, implementer is single-vendor claude.

# --- gates ---------------------------------------------------------------
fastGate: "make check"     # bash -n + shellcheck, each review round
shipGate: "make verify"    # check + metadata/installer sanity, mirrors CI

# --- implementer (the only writer) ---------------------------------------
implementer:
  backend: claude          # single-vendor: no heavy codegen here, one auth/model
  model: ""                # blank = adapter default
  autonomous: true         # dogfood runs headless; Bash(claude -p:*) is committed in .claude/settings.json

# --- orchestrator (reads the SKILL.md playbooks, runs the stages, fans out reviewers) ---
# INDEPENDENT of implementer.backend (the writer). claude keeps existing behavior unchanged.
# See metate-review/ORCHESTRATORS.md for the per-runtime command blocks + verification table.
orchestrator:
  backend: claude          # claude | codex | cursor

sessionFile: ".metate/session.json"
issueLedger: ".metate/issues.json"   # issues filed by prep, read by ship for auto-close
isolation: none

# --- codebase memory (structural context provider) -----------------------
# Review sub-agents prefer the codebase-memory-mcp knowledge graph over grep/Read.
# Mostly bash+markdown here, so the graph's payoff is modest — but dogfooded on.
codebaseMemory:
  enabled: true
  reindex: git
  indexCommand: ""

# --- review (metate-review) ----------------------------------------------
reviewFocus: |
  - install.sh works from BOTH a local checkout and `curl … | bash` (GitHub clone path);
    neither path regresses — local must not clone, piped must fetch the right ref.
  - shell scripts pass `bash -n` and stay set -euo pipefail clean; placeholder gates fail loudly.
  - bootstrap.sh stays idempotent: never clobbers an existing profile.yml; .gitignore append is one-shot.
  - skills carry NO project-specific content — engines stay codebase-agnostic (all specifics in profile).
  - SKILL.md frontmatter is valid and allowed-tools honor the invariant that the implementer is the
    ONLY writer (metate-review stays read-only: Read/Bash/Agent, no Write/Edit).

# Auto-fix scope: blockers | blockers+warnings | all (reporting is always unconditional).
review:
  autoFix: blockers+warnings

# --- discover (metate-discover) ------------------------------------------
discover:
  signals:                 # which sources to sweep for candidate work
    aftercare: true        # last sprint's deliverables (roadmap, next-sprint pointers) — the loop-closing input
    codebaseMemory: true   # graph: dead code, high fan-out, churn, coverage gaps (needs codebaseMemory.enabled)
    issues: true           # open gh issues + techDebtFile items whose trigger has fired
    gitHistory: true       # churn hotspots + TODO/FIXME/HACK scan (cheapest, noisiest)
  planFile: ".metate/plan.md"   # discover writes here; prep reads it as its entry doc
  candidates: 5            # how many ranked candidates to propose

# --- prep (metate-prep) --------------------------------------------------
prep:
  baseBranch: main         # no dev branch on this repo
  readingOrder: ["README.md", "docs/ROADMAP.md"]
  techDebtFile: "docs/TECH-DEBT.md"
  issues:                  # file the ledger at sprint start from the text plan
    create: true           # false = skip issue filing entirely
    tracker: github        # gh CLI
    granularity: test-matrix  # one issue per DoD test-matrix item (T1…Tn)
    labels: ["sprint"]     # applied to every filed issue
    milestone: ""          # blank = none

# --- smoke (metate-smoke) ------------------------------------------------
smoke:
  command: "make verify"   # no e2e suite; the gate IS the smoke for a tooling repo
  seedCommand: ""

# --- aftercare (metate-aftercare) ----------------------------------------
aftercare:
  deliverables: ["README.md", "docs/ROADMAP.md", "docs/TECH-DEBT.md"]

# --- ship (metate-ship) --------------------------------------------------
ship:
  prTarget: main
  commitStyle: "conventional, bisectable, one per concern"
  issueCloseKeyword: "Closes"
